name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - "packages/shared/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/fish
            git pull
            pnpm install
            pnpm --filter @fish/shared build
            sudo systemctl restart fish-server
